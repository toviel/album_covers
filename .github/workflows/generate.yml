name: Generate Album Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate HTML files for each JPEG
        run: |
          for img in *.JPG *.jpg *.jpeg; do
            [ -f "$img" ] || continue
            name="${img%.*}"
            outfile="${name}.html"
            cat > "$outfile" << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background: transparent; overflow: hidden; }
            #container {
              display: flex;
              flex-direction: row;
              gap: 60px;
              padding: 40px;
              align-items: center;
              justify-content: center;
              height: 100vh;
            }
          </style>
          </head>
          <body>
          <div id="container"></div>
          <script type="importmap">
          {
            "imports": {
              "three": "./three.module.js",
              "three/addons/": "./"
            }
          }
          </script>
          <script type="module">
          import * as THREE from "three";
          import { RoundedBoxGeometry } from "./RoundedBoxGeometry.js";

          const albums = [
            { image: "$img" },
          ];

          function createSmearTexture(sourceImage, side) {
            const size = 256;
            const canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");
            const sw = sourceImage.width;
            const sh = sourceImage.height;
            const sliceWidth = Math.floor(sw * 0.08);

            if (side === "right") {
              for (let x = 0; x < size; x++) {
                const srcX = sw - sliceWidth + Math.floor((x / size) * sliceWidth);
                ctx.drawImage(sourceImage, srcX, 0, 1, sh, x, 0, 1, size);
              }
            } else if (side === "left") {
              for (let x = 0; x < size; x++) {
                const srcX = Math.floor((x / size) * sliceWidth);
                ctx.drawImage(sourceImage, srcX, 0, 1, sh, x, 0, 1, size);
              }
            } else if (side === "top") {
              for (let y = 0; y < size; y++) {
                const srcY = Math.floor((y / size) * sliceWidth);
                ctx.drawImage(sourceImage, 0, srcY, sw, 1, 0, y, size, 1);
              }
            } else if (side === "bottom") {
              for (let y = 0; y < size; y++) {
                const srcY = sh - sliceWidth + Math.floor((y / size) * sliceWidth);
                ctx.drawImage(sourceImage, 0, srcY, sw, 1, 0, y, size, 1);
              }
            } else if (side === "back") {
              ctx.filter = "blur(24px)";
              ctx.drawImage(sourceImage, -20, -20, size + 40, size + 40);
            }

            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
              const noise = (Math.random() - 0.5) * 15;
              data[i]   = Math.min(255, Math.max(0, data[i]   + noise));
              data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
              data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
            }
            ctx.putImageData(imageData, 0, 0);

            return new THREE.CanvasTexture(canvas);
          }

          albums.forEach(album => {
            const container = document.getElementById("container");
            const canvas = document.createElement("canvas");
            canvas.width = 480;
            canvas.height = 480;
            canvas.style.cursor = "grab";
            canvas.style.touchAction = "none";
            container.appendChild(canvas);

            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(480, 480);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
            camera.position.z = 4;

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => {
              const frontTexture = new THREE.TextureLoader().load(album.image);
              const rightTex  = createSmearTexture(img, "right");
              const leftTex   = createSmearTexture(img, "left");
              const topTex    = createSmearTexture(img, "top");
              const bottomTex = createSmearTexture(img, "bottom");
              const backTex   = createSmearTexture(img, "back");

              const glossy = { roughness: 0.0, metalness: 0.3 };
              const geometry = new RoundedBoxGeometry(1.8, 1.8, 0.55, 4, 0.15);

              const materials = [
                new THREE.MeshStandardMaterial({ map: rightTex,     ...glossy }),
                new THREE.MeshStandardMaterial({ map: leftTex,      ...glossy }),
                new THREE.MeshStandardMaterial({ map: topTex,       ...glossy }),
                new THREE.MeshStandardMaterial({ map: bottomTex,    ...glossy }),
                new THREE.MeshStandardMaterial({ map: frontTexture, roughness: 0.0, metalness: 0.2 }),
                new THREE.MeshStandardMaterial({ map: backTex,      ...glossy }),
              ];

              const cube = new THREE.Mesh(geometry, materials);
              cube.rotation.y = -0.3;
              scene.add(cube);

              const ambient = new THREE.AmbientLight(0xffffff, 1.0);
              scene.add(ambient);
              const dir = new THREE.DirectionalLight(0xffffff, 1.4);
              dir.position.set(3, 5, 5);
              scene.add(dir);
              const fill = new THREE.DirectionalLight(0xffffff, 0.4);
              fill.position.set(-3, -2, -3);
              scene.add(fill);
              const rim = new THREE.DirectionalLight(0xffffff, 0.3);
              rim.position.set(0, -5, -5);
              scene.add(rim);

              let isDragging = false;
              let prevMouse = { x: 0, y: 0 };
              let velX = 0;

              canvas.addEventListener("mousedown", e => {
                isDragging = true;
                velX = 0;
                prevMouse = { x: e.clientX, y: e.clientY };
                canvas.style.cursor = "grabbing";
              });
              window.addEventListener("mouseup", () => {
                isDragging = false;
                canvas.style.cursor = "grab";
              });
              window.addEventListener("mousemove", e => {
                if (!isDragging) return;
                velX = (e.clientX - prevMouse.x) * 0.012;
                cube.rotation.y += velX;
                prevMouse = { x: e.clientX, y: e.clientY };
              });

              canvas.addEventListener("touchstart", e => {
                e.preventDefault();
                prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                velX = 0;
              }, { passive: false });
              canvas.addEventListener("touchmove", e => {
                e.preventDefault();
                velX = (e.touches[0].clientX - prevMouse.x) * 0.012;
                cube.rotation.y += velX;
                prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
              }, { passive: false });

              (function animate() {
                requestAnimationFrame(animate);
                if (!isDragging) {
                  cube.rotation.y += velX;
                  velX *= 0.92;
                }
                renderer.render(scene, camera);
              })();
            };
            img.src = album.image;
          });
          </script>
          </body>
          </html>
          HTMLEOF
          done

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.html
          git diff --cached --quiet || git commit -m "Auto-generate album HTML files"
          git push
